name: Build signed desktop installers

env:
  # Tag builds pass their version into both proven packaging scripts. Manual
  # builds fall back to the version in pyproject.toml.
  LEAPS_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: Desktop platform to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Verify release tag matches the application version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          PROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match pyproject.toml version $PROJECT_VERSION" >&2
            exit 1
          fi
      - run: ruff check .
      - run: QT_QPA_PLATFORM=offscreen pytest

  macos:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'macos' || inputs.target == 'all'
    needs: test
    runs-on: macos-14
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Import Apple signing certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain
      - name: Configure notarization
        if: ${{ env.APPLE_API_KEY_BASE64 != '' }}
        run: |
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > AuthKey.p8
          xcrun notarytool store-credentials LEAPS-notary --key AuthKey.p8 --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID"
          echo "APPLE_NOTARY_PROFILE=LEAPS-notary" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and staple
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: LEAPS-macOS
          path: artifacts/LEAPS-Apple-Silicon.dmg

  windows:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'windows' || inputs.target == 'all'
    needs: test
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Run Windows alignment and UI regressions
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q tests/test_windows_regressions.py
      - name: Decode Windows certificate
        if: ${{ env.WINDOWS_CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes('windows-signing.pfx', [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "WINDOWS_CERTIFICATE_PATH=windows-signing.pfx" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Build and sign
        shell: pwsh
        run: ./scripts/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: LEAPS-Windows
          path: artifacts/LEAPS-Windows-x64-Setup.exe

  release:
    if: startsWith(github.ref, 'refs/tags/') && always() && needs.macos.result == 'success' && needs.windows.result == 'success'
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*
