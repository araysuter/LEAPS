name: Build signed desktop installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: QT_QPA_PLATFORM=offscreen pytest

  macos:
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Import Apple signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
      - name: Configure notarization
        if: ${{ secrets.APPLE_API_KEY_BASE64 != '' }}
        env:
          API_KEY: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          echo "$API_KEY" | base64 --decode > AuthKey.p8
          xcrun notarytool store-credentials LEAPS-notary --key AuthKey.p8 --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID"
      - name: Build, sign, notarize, and staple
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_API_KEY_BASE64 != '' && 'LEAPS-notary' || '' }}
        run: bash scripts/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: LEAPS-macOS
          path: artifacts/LEAPS-Apple-Silicon.dmg

  windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Decode Windows certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: "[IO.File]::WriteAllBytes('windows-signing.pfx', [Convert]::FromBase64String($env:CERTIFICATE_BASE64))"
      - name: Build and sign
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PATH: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && 'windows-signing.pfx' || '' }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: ./scripts/build_windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: LEAPS-Windows
          path: artifacts/LEAPS-Windows-x64-Setup.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*
